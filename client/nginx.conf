server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Static asset caching (hashed filenames → long cache) ────────────────
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → backend service ─────────────────────────────────────────
    # All /api/* requests are forwarded to the backend container.
    # The backend is NOT exposed on any host port — only reachable internally.
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        # Required for WebSocket / keep-alive
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';

        # Forward real client info
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts — AI analysis can take 30+ seconds
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── React SPA fallback ───────────────────────────────────────────────────
    # Any request that doesn't match a static file falls back to index.html
    # so React Router handles client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
